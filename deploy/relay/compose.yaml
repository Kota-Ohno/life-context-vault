services:
  relay:
    build:
      context: ../..
      dockerfile: deploy/relay/Dockerfile
    image: life-context-vault-relay:local
    env_file:
      - ./relay.env
    volumes:
      - relay-data:/data
    expose:
      - "8765"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true

  caddy:
    image: caddy:2.8
    depends_on:
      - relay
    env_file:
      - ./compose.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true

volumes:
  relay-data:
  caddy-data:
  caddy-config:
